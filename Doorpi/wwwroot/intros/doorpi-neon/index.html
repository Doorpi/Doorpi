<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doorpi OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #020309;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #appBlobWrap {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: #07071a;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

            #appBlobWrap.bang-active {
                opacity: 1;
            }

        .app-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(45px);
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        #appBlobVig {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: radial-gradient(circle at 50% 50%, transparent 25%, rgba(0,0,18,0.85) 95%);
            pointer-events: none;
        }

        #boot-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: #020309;
        }

        #boot-sequence {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: sceneIn 1.2s ease-out 0.2s forwards;
        }

        @keyframes sceneIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #logo-wrap {
            perspective: 900px;
            perspective-origin: 50% 45%;
            transform: translateX(-5%);
            position: relative;
        }

        #door-logo {
            width: clamp(420px, 45vw, 680px);
            display: block;
            overflow: visible;
            transform: rotateX(25deg) rotateY(-15deg) scale(0.9);
            transform-style: preserve-3d;
            transition: transform 3.5s cubic-bezier(0.16,1,0.3,1), filter 0.6s ease;
            filter: brightness(0.8);
            position: relative;
            z-index: 2;
        }

        .boot-step-draw #door-logo {
            transform: rotateX(8deg) rotateY(-6deg) scale(1);
            filter: brightness(1);
        }

        .boot-step-draw #door-path-stroke {
            animation: traceLine 2.2s cubic-bezier(0.35,0,0.2,1) forwards;
        }

        @keyframes traceLine {
            from {
                stroke-dashoffset: var(--path-len);
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        /* Removido o brilho extremo, agora a animação é mais elegante e sutil */
        .boot-step-charge #door-logo {
            transform: rotateX(3deg) rotateY(-2deg) scale(1.02);
            transition: transform 3.2s cubic-bezier(0.2,0,0.1,1);
            animation: elegantFocus 3.5s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
        }

        @keyframes elegantFocus {
            0% {
                filter: blur(3px) brightness(0.9);
                opacity: 0.9;
            }

            50% {
                filter: blur(0px) brightness(1.1);
                opacity: 1;
            }

            100% {
                filter: blur(0px) brightness(1.2);
                opacity: 1;
            }
        }

        .boot-step-charge #door-path-stroke {
            animation: elegantCharge 3.5s cubic-bezier(0.2,0,0.1,1) forwards;
        }

        /* Cores baseadas no seu novo SVG, trazendo um aspecto premium/vidro */
        @keyframes elegantCharge {
            0% {
                stroke: rgba(138, 158, 188, 0.4);
                fill: rgba(200, 214, 236, 0);
            }

            100% {
                stroke: rgba(200, 214, 236, 0.6);
                fill: rgba(200, 214, 236, 0.15); /* Fundo translúcido sutil em vez do branco forte */
            }
        }

        .boot-step-detonate #boot-sequence {
            animation: bootFadeOut 0.15s ease-out forwards !important;
        }

        @keyframes bootFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
                transform: scale(0.95);
            }
        }

        #door-path-stroke {
            fill: transparent;
            stroke: rgba(138, 158, 188, 0.5);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: fill 2.5s cubic-bezier(0.2,0.8,0.2,1);
        }

        #boot-message {
            margin-top: clamp(30px,5vh,60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Texto Doorpi - Mais legível (brancura aumentada e peso um pouco maior) */
        #boot-sysname {
            font-size: clamp(1.4rem,2.5vw,2.5rem);
            font-weight: 300;
            letter-spacing: 0.68em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.9);
            text-indent: 0.68em;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease-out, transform 1s cubic-bezier(0.16,1,0.3,1);
        }

        .boot-step-charge #boot-sysname {
            opacity: 1;
            transform: translateY(0);
        }

        #boot-divider {
            width: 40px;
            height: 1px;
            background: rgba(255,255,255,0.4);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s;
        }

        .boot-step-charge #boot-divider {
            transform: scaleX(1);
        }

        .subtle-spark {
            position: fixed;
            width: 4px;
            height: 2px;
            background: #e6f2ff;
            border-radius: 50%;
            box-shadow: 0 0 6px 1px rgba(160,200,255,0.8);
            pointer-events: none;
            z-index: 9001;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

        <div id="appBlobVig"></div>
    </div>

    <div id="boot-sequence">

        </div>
        <div id="boot-message">
            <span id="boot-sysname">Doorpi</span>

    <script>
        const introAudio = new Audio('./intro.wav');
        introAudio.preload = 'auto';
        let introVolumeScale = 1;
        introAudio.volume = 0.8;

        window.addEventListener('message', event => {
            const data = event.data;
            if (!data || data.type !== 'doorpi:intro:set-volume') return;
            introVolumeScale = Math.max(0, Math.min(1, Number(data.volume) || 0));
            introAudio.volume = 0.8 * introVolumeScale;
        });

        document.addEventListener("DOMContentLoaded", () => {
            const body = document.body;
            const strokePath = document.getElementById('door-path-stroke');
            const logoSvg = document.getElementById('door-logo');
            const blobWrap = document.getElementById('appBlobWrap');

            const len = strokePath.getTotalLength();
            strokePath.style.setProperty('--path-len', len + 'px');
            strokePath.style.strokeDasharray = len;
            strokePath.style.strokeDashoffset = len;

            const wait = ms => new Promise(r => setTimeout(r, ms));
            function post(type, payload = {}) {
                try { window.parent?.postMessage({ type, ...payload }, '*'); } catch (_) { }
                window.dispatchEvent(new CustomEvent(type, { detail: payload }));
            }
            /* ── BLOB PHYSICS (Mantido para a transição final) ──────── */
            const blobs = [];
            const colors = [
                'rgba(15,25,85,0.7)', 'rgba(10,30,85,0.7)', 'rgba(25,15,70,0.7)', 'rgba(5,40,75,0.7)',
                'rgba(20,20,90,0.6)', 'rgba(15,35,70,0.6)', 'rgba(10,15,60,0.7)', 'rgba(30,20,80,0.6)'
            ];

            function createBigBang() {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const r = Math.max(1, window.innerWidth / window.innerHeight);
                for (let i = 0; i < 8; i++) {
                    const el = document.createElement('div');
                    el.className = 'app-blob';
                    const size = Math.min(window.innerWidth, window.innerHeight) * (0.5 + Math.random() * 0.4);
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.background = `radial-gradient(circle, ${colors[i]} 0%, transparent 70%)`;
                    blobWrap.insertBefore(el, document.getElementById('appBlobVig'));
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 12 + Math.random() * 12;
                    blobs.push({
                        el, x: cx, y: cy, size,
                        vx: Math.cos(angle) * speed * (r * 0.8),
                        vy: Math.sin(angle) * speed,
                        phase: 'burst', wanderAngle: angle
                    });
                }
                requestAnimationFrame(physicsLoop);
            }

            function physicsLoop() {
                const w = window.innerWidth, h = window.innerHeight;
                blobs.forEach(b => {
                    if (b.phase === 'burst') {
                        b.vx *= 0.985; b.vy *= 0.985;
                        b.x += b.vx; b.y += b.vy;
                        const m = b.size * 0.4;
                        if (b.x < -m) { b.x = -m; b.vx *= -1; }
                        if (b.x > w + m) { b.x = w + m; b.vx *= -1; }
                        if (b.y < -m) { b.y = -m; b.vy *= -1; }
                        if (b.y > h + m) { b.y = h + m; b.vy *= -1; }
                        if (Math.hypot(b.vx, b.vy) < 0.8) b.phase = 'wander';
                    } else {
                        b.wanderAngle += (Math.random() - 0.5) * 0.02;
                        b.vx = Math.cos(b.wanderAngle) * 1.5;
                        b.vy = Math.sin(b.wanderAngle) * 1.5;
                        b.x += b.vx; b.y += b.vy;
                        if (b.x > w + b.size / 2) b.x = -b.size / 2;
                        if (b.x < -b.size / 2) b.x = w + b.size / 2;
                        if (b.y > h + b.size / 2) b.y = -b.size / 2;
                        if (b.y < -b.size / 2) b.y = h + b.size / 2;
                    }
                    b.el.style.transform = `translate3d(${b.x - b.size / 2}px,${b.y - b.size / 2}px,0)`;
                });
                requestAnimationFrame(physicsLoop);
            }

            /* ── SPARKS (Mantido para sutileza) ──────────────────────── */
            function spawnSparks(isBurst = false) {
                const rect = logoSvg.getBoundingClientRect();
                const count = isBurst ? 15 : 1;
                for (let i = 0; i < count; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'subtle-spark';
                    document.body.appendChild(spark);
                    let x, y, distance, duration;
                    if (isBurst) {
                        x = window.innerWidth / 2; y = window.innerHeight / 2;
                        distance = 40 + Math.random() * 60;
                        duration = 1200 + Math.random() * 800;
                    } else {
                        x = rect.left + Math.random() * rect.width;
                        y = rect.top + Math.random() * rect.height;
                        distance = 15 + Math.random() * 25;
                        duration = 800 + Math.random() * 600;
                    }
                    const angle = Math.random() * Math.PI * 2;
                    spark.style.left = x + 'px';
                    spark.style.top = y + 'px';
                    spark.animate([
                        { transform: 'translate(-50%,-50%) scale(1)', opacity: isBurst ? 1 : 0.6 },
                        { transform: `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px)) scale(0)`, opacity: 0 }
                    ], { duration, easing: 'cubic-bezier(0.25,1,0.5,1)', fill: 'forwards' });
                    setTimeout(() => spark.remove(), duration);
                }
            }

            /* ── BOOT SEQUENCE ───────────────────────────────────────── */
            async function runBootSequence() {
                await wait(500);
                introAudio.currentTime = 0;
                introAudio.play();
                await wait(450);

                body.classList.add('boot-step-draw');
                await wait(2300);

                strokePath.style.strokeDashoffset = '0';
                void strokePath.getBoundingClientRect();

                body.classList.add('boot-step-charge');

                const sparkInterval = setInterval(() => spawnSparks(false), 300);
                await wait(3200);
                clearInterval(sparkInterval);

                body.classList.add('boot-step-detonate');
                blobWrap.classList.add('bang-active');
                createBigBang();
                spawnSparks(true);

                post('doorpi:intro:handoff', {
                    handoff: {
                        background: '#07071a',
                        vignette: 'radial-gradient(circle at 50% 50%, transparent 25%, rgba(0,0,18,0.85) 95%)',
                        colors
                    }
                });
                await wait(2000);
                post('doorpi:intro:complete');
            }

            runBootSequence().catch(() => post('doorpi:intro:error'));
        });
    </script>

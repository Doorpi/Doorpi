<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doorpi Intro</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #020309;
            font-family: "Outfit", "Segoe UI", Arial, sans-serif;
        }

        #appBlobWrap {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            background: #07071a;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #appBlobWrap.bang-active {
            opacity: 1;
        }

        .app-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(45px);
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        #appBlobVig {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 25%, rgba(0, 0, 18, 0.85) 95%);
        }

        #boot-sequence {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: sceneIn 1.2s ease-out 0s forwards;
        }

        @keyframes sceneIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #logo-wrap {
            perspective: 900px;
            perspective-origin: 50% 45%;
            transform: translateX(-5%);
        }

        #door-logo {
            width: clamp(420px, 45vw, 680px);
            display: block;
            overflow: visible;
            transform: rotateX(14deg) rotateY(-10deg) scale(0.94);
            transform-style: preserve-3d;
            transition: transform 2.2s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
            filter: brightness(0.7);
        }

        .boot-step-draw #door-logo {
            transform: rotateX(0deg) rotateY(0deg) scale(1);
            filter: brightness(1);
        }

        #door-path-stroke {
            fill: none;
            stroke: rgba(110, 150, 210, 0.45);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .boot-step-draw #door-path-stroke {
            animation: traceLine 2.2s cubic-bezier(0.35, 0, 0.2, 1) forwards;
        }

        @keyframes traceLine {
            from { stroke-dashoffset: var(--path-len); }
            to { stroke-dashoffset: 0; }
        }

        .boot-step-charge #door-path-stroke {
            animation: neonCharge 3.2s cubic-bezier(0.2, 0, 0.1, 1) forwards;
        }

        @keyframes neonCharge {
            0% {
                stroke: rgba(110, 150, 210, 0.50);
                stroke-width: 1.5;
                filter: none;
            }

            20% {
                stroke: rgba(138, 178, 240, 0.68);
                stroke-width: 1.6;
                filter: drop-shadow(0 0 3px rgba(90, 150, 255, 0.55));
            }

            42% {
                stroke: rgba(163, 202, 253, 0.82);
                stroke-width: 1.72;
                filter: drop-shadow(0 0 4px rgba(105, 168, 255, 0.74)) drop-shadow(0 0 12px rgba(62, 118, 238, 0.30));
            }

            66% {
                stroke: rgba(192, 220, 255, 0.93);
                stroke-width: 1.88;
                filter: drop-shadow(0 0 5px rgba(118, 180, 255, 0.88)) drop-shadow(0 0 16px rgba(70, 130, 244, 0.46)) drop-shadow(0 0 30px rgba(42, 96, 218, 0.22));
            }

            88% {
                stroke: rgba(215, 234, 255, 0.98);
                stroke-width: 2.02;
                filter: drop-shadow(0 0 6px rgba(138, 196, 255, 0.96)) drop-shadow(0 0 19px rgba(84, 148, 255, 0.60)) drop-shadow(0 0 34px rgba(50, 108, 230, 0.32));
            }

            100% {
                stroke: rgba(232, 244, 255, 1);
                stroke-width: 2.1;
                filter: drop-shadow(0 0 7px rgba(158, 210, 255, 1)) drop-shadow(0 0 22px rgba(92, 158, 255, 0.72)) drop-shadow(0 0 38px rgba(54, 112, 234, 0.40)) drop-shadow(0 0 58px rgba(34, 82, 212, 0.18));
            }
        }

        #boot-message {
            margin-top: clamp(30px, 5vh, 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #boot-sysname {
            font-size: clamp(0.85rem, 1.2vw, 1.1rem);
            font-weight: 200;
            letter-spacing: 0.68em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.40);
            text-indent: 0.68em;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease-out, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .boot-step-charge #boot-sysname {
            opacity: 1;
            transform: translateY(0);
        }

        #boot-divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.25);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
        }

        .boot-step-charge #boot-divider {
            transform: scaleX(1);
        }

        #boot-greeting {
            font-size: clamp(1.6rem, 2.8vw, 2.2rem);
            font-weight: 200;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 15px rgba(160, 200, 255, 0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1.3s ease-out 0.4s, transform 1.3s cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
        }

        .boot-step-charge #boot-greeting {
            opacity: 1;
            transform: translateY(0);
        }

        .boot-step-detonate #boot-sequence {
            animation: bootFadeOut 0.15s ease-out forwards;
        }

        @keyframes bootFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
                transform: scale(0.95);
            }
        }

        .subtle-spark {
            position: fixed;
            z-index: 4;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: #e6f2ff;
            box-shadow: 0 0 6px 1px rgba(160, 200, 255, 0.8);
            pointer-events: none;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

        <div id="appBlobVig"></div>
    </div>

    <div id="boot-sequence">
        <div id="logo-wrap">

        </div>

        <div id="boot-message">
            <span id="boot-sysname">Doorpi</span>
            <div id="boot-divider"></div>
            <span id="boot-greeting">Bem-vindo.</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const strokePath = document.getElementById('door-path-stroke');
            const logoSvg = document.getElementById('door-logo');
            const blobWrap = document.getElementById('appBlobWrap');
            const colors = [
                'rgba(15,25,85,0.7)', 'rgba(10,30,85,0.7)',
                'rgba(25,15,70,0.7)', 'rgba(5,40,75,0.7)',
                'rgba(20,20,90,0.6)', 'rgba(15,35,70,0.6)',
                'rgba(10,15,60,0.7)', 'rgba(30,20,80,0.6)'
            ];

            const len = strokePath.getTotalLength();
            strokePath.style.setProperty('--path-len', `${len}px`);
            strokePath.style.strokeDasharray = len;
            strokePath.style.strokeDashoffset = len;

            const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
            const blobs = [];

            function post(type, payload = {}) {
                try { window.parent?.postMessage({ type, ...payload }, '*'); } catch { }
            }

            function createBigBang() {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const ratio = Math.max(1, window.innerWidth / Math.max(1, window.innerHeight));

                for (let i = 0; i < 8; i++) {
                    const el = document.createElement('div');
                    el.className = 'app-blob';
                    const size = Math.min(window.innerWidth, window.innerHeight) * (0.5 + Math.random() * 0.4);
                    el.style.width = `${size}px`;
                    el.style.height = `${size}px`;
                    el.style.background = `radial-gradient(circle, ${colors[i]} 0%, transparent 70%)`;
                    blobWrap.insertBefore(el, document.getElementById('appBlobVig'));

                    const angle = Math.random() * Math.PI * 2;
                    const speed = 12 + Math.random() * 12;
                    blobs.push({
                        el,
                        x: cx,
                        y: cy,
                        size,
                        vx: Math.cos(angle) * speed * (ratio * 0.8),
                        vy: Math.sin(angle) * speed,
                        phase: 'burst',
                        wanderAngle: angle
                    });
                }

                requestAnimationFrame(physicsLoop);
            }

            function physicsLoop() {
                const w = window.innerWidth;
                const h = window.innerHeight;

                for (const blob of blobs) {
                    if (blob.phase === 'burst') {
                        blob.vx *= 0.985;
                        blob.vy *= 0.985;
                        blob.x += blob.vx;
                        blob.y += blob.vy;
                        const margin = blob.size * 0.4;
                        if (blob.x < -margin) { blob.x = -margin; blob.vx *= -1; }
                        if (blob.x > w + margin) { blob.x = w + margin; blob.vx *= -1; }
                        if (blob.y < -margin) { blob.y = -margin; blob.vy *= -1; }
                        if (blob.y > h + margin) { blob.y = h + margin; blob.vy *= -1; }
                        if (Math.hypot(blob.vx, blob.vy) < 0.8) blob.phase = 'wander';
                    } else {
                        blob.wanderAngle += (Math.random() - 0.5) * 0.02;
                        blob.vx = Math.cos(blob.wanderAngle) * 1.5;
                        blob.vy = Math.sin(blob.wanderAngle) * 1.5;
                        blob.x += blob.vx;
                        blob.y += blob.vy;
                        if (blob.x > w + blob.size / 2) blob.x = -blob.size / 2;
                        if (blob.x < -blob.size / 2) blob.x = w + blob.size / 2;
                        if (blob.y > h + blob.size / 2) blob.y = -blob.size / 2;
                        if (blob.y < -blob.size / 2) blob.y = h + blob.size / 2;
                    }

                    blob.el.style.transform = `translate3d(${blob.x - blob.size / 2}px, ${blob.y - blob.size / 2}px, 0)`;
                }

                requestAnimationFrame(physicsLoop);
            }

            function spawnSparks(isBurst = false) {
                const rect = logoSvg.getBoundingClientRect();
                const count = isBurst ? 15 : 1;

                for (let i = 0; i < count; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'subtle-spark';
                    document.body.appendChild(spark);

                    let x;
                    let y;
                    let distance;
                    let duration;

                    if (isBurst) {
                        x = window.innerWidth / 2;
                        y = window.innerHeight / 2;
                        distance = 40 + Math.random() * 60;
                        duration = 1200 + Math.random() * 800;
                    } else {
                        x = rect.left + Math.random() * rect.width;
                        y = rect.top + Math.random() * rect.height;
                        distance = 15 + Math.random() * 25;
                        duration = 800 + Math.random() * 600;
                    }

                    const angle = Math.random() * Math.PI * 2;
                    spark.style.left = `${x}px`;
                    spark.style.top = `${y}px`;
                    spark.animate([
                        { transform: 'translate(-50%, -50%) scale(1)', opacity: isBurst ? 1 : 0.6 },
                        {
                            transform: `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px)) scale(0)`,
                            opacity: 0
                        }
                    ], {
                        duration,
                        easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                        fill: 'forwards'
                    });

                    setTimeout(() => spark.remove(), duration);
                }
            }

            async function runBootSequence() {
                await wait(0);
                body.classList.add('boot-step-draw');
                await wait(2300);

                strokePath.style.strokeDashoffset = '0';
                void strokePath.getBoundingClientRect();
                body.classList.add('boot-step-charge');

                const sparkInterval = setInterval(() => spawnSparks(false), 300);
                await wait(3200);

                clearInterval(sparkInterval);
                body.classList.add('boot-step-detonate');
                blobWrap.classList.add('bang-active');

                createBigBang();
                spawnSparks(true);
                post('doorpi:intro:handoff', {
                    handoff: {
                        background: '#07071a',
                        vignette: 'radial-gradient(circle at 50% 50%, transparent 25%, rgba(0, 0, 18, 0.85) 95%)',
                        colors
                    }
                });

                await wait(1200);
                post('doorpi:intro:complete');
            }

            runBootSequence().catch(() => post('doorpi:intro:error'));
        });
    </script>
</body>

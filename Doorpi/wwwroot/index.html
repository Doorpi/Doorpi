<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launcher UI - Console Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- SVG Noise Filter (usado como textura sutil no modal) -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise" />
                <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise" />
                <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended" />
                <feComposite in="blended" in2="SourceGraphic" operator="in" />
            </filter>
        </defs>
    </svg>

    <!-- Topo e Relógio -->
    <div class="top-bar">
        <div id="clock">00:00</div>
    </div>

    <!-- Fundo atmosférico (blur da capa vertical) + banner hero -->
    <div class="capaJogo" id="capaJogo">
        <img id="bgBlur" />
        <img id="heroImage" />
    </div>

    <!-- Logo fora do capaJogo para ficar acima do frosted strip -->
    <img id="gameLogo" />


    <!-- Background desfocado atrás do carrossel (capa vertical duplicada) -->
    <div class="grid-bg">
        <img id="gridBgImg" />
    </div>

    <!-- Grid Principal de Jogos -->
    <div class="game-grid" id="gameGrid">
        <div class="card add-card" tabindex="0" id="btnAdd">
            <div class="plus">+</div>
            <div class="title">Adicionar Jogo</div>
        </div>
    </div>

    <!-- MODAL ESTILO PS5 -->
    <div id="addGameContainer">
        <div class="modal-layout">

            <!-- MENU LATERAL -->
            <div class="modal-sidebar">
                <p class="sidebar-eyebrow">Menu</p>
                <h1 class="sidebar-title">Configurações</h1>
                <div class="sidebar-menu">
                    <button class="menu-tab active" tabindex="0" onclick="switchTab('apps')">
                        <span class="tab-icon">⊞</span>
                        Aplicativos
                    </button>
                    <button class="menu-tab" tabindex="0" onclick="switchTab('folders')">
                        <span class="tab-icon">◫</span>
                        Gerenciar Pastas
                    </button>
                </div>
            </div>

            <!-- ÁREA DE CONTEÚDO PRINCIPAL -->
            <div class="modal-content-area">

                <!-- === TELA 1: APLICATIVOS === -->
                <div id="view-apps" class="view-section active">
                    <div class="view-header">
                        <h2 id="modalTitle">Selecione os aplicativos</h2>
                        <div class="filter-bar" id="filterBar"></div>

                    </div>

                    <!-- Wrapper com fade na borda inferior -->
                    <div class="applist-wrapper">
                        <div id="appList"></div>

                    </div>

                    <!-- Barra de Ações Fixa -->
                    <div class="action-bar" id="modalActions">
                        <!-- Counter de seleção: aparece com CSS quando tem itens selecionados -->
                        <div class="selection-counter" id="selectionCounter">
                            <span class="counter-dot"></span>
                            <span id="selectionCounterText">0 selecionados</span>
                        </div>

                        <div class="action-buttons">
                            <button class="modal-btn primary" id="btnConfirmAdd" tabindex="0">
                                Adicionar Selecionados
                            </button>
                            <button class="modal-btn secondary" id="btnSearch" tabindex="0">
                                Procurar Manualmente
                            </button>
                            <button class="modal-btn cancel" id="btnCancelAdd" tabindex="0">Voltar</button>
                        </div>
                    </div>
                </div>

                <!-- === TELA 2: GERENCIAR PASTAS === -->
                <div id="view-folders" class="view-section hidden">
                    <div class="view-header">
                        <h2>Pastas Monitoradas</h2>
                        <p class="subtitle">O sistema buscará jogos automaticamente nestes diretórios.</p>
                    </div>

                    <div class="applist-wrapper">
                        <div id="folderList">
                            <div class="folder-item" tabindex="0">
                                <div class="folder-info">
                                    <span class="folder-icon">◫</span>
                                    <span class="folder-path">C:\Program Files (x86)\Steam\steamapps\common</span>
                                </div>
                                <div class="folder-actions">
                                    <button class="icon-btn edit-btn" tabindex="0">Editar</button>
                                    <button class="icon-btn delete-btn" tabindex="0">Remover</button>
                                </div>
                            </div>
                        </div>
                        <div class="applist-fade"></div>
                    </div>

                    <div class="action-bar">
                        <div class="action-buttons">
                            <button class="modal-btn primary" id="btnScanFolder" tabindex="0">Adicionar Nova Pasta</button>
                            <button class="modal-btn cancel" tabindex="0" onclick="closeModal()">Voltar</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(v => {
                v.classList.remove('active');
                v.classList.add('hidden');
            });

            if (tabId === 'apps') {
                document.querySelectorAll('.menu-tab')[0].classList.add('active');
                document.getElementById('view-apps').classList.remove('hidden');
                document.getElementById('view-apps').classList.add('active');
            } else {
                document.querySelectorAll('.menu-tab')[1].classList.add('active');
                document.getElementById('view-folders').classList.remove('hidden');
                document.getElementById('view-folders').classList.add('active');
            }
        }
    </script>
</body>
</html>
